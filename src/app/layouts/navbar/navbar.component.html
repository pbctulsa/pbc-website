<header class="site-header">
  <nav class="nav-shell" aria-label="Main navigation">
    <a class="brand" routerLink="/" (click)="closeMenu()">
      <img class="brand-logo" src="pbc-logo.png" [alt]="church.name + ' logo'">
      <span class="brand-text">{{ church.name }}</span>
    </a>

    <button
      class="menu-toggle"
      type="button"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="primary-menu"
      (click)="toggleMenu()"
    >
      {{ t('nav.menu') }}
    </button>

    <ul id="primary-menu" class="nav-links" [class.open]="menuOpen()">
      <li *ngFor="let item of navItems" [class.has-submenu]="item.children">
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          (click)="closeMenu()"
        >
          {{ t(item.labelKey) }}
        </a>
        <ul class="submenu" *ngIf="item.children">
          <li *ngFor="let child of item.children">
            <a
              *ngIf="!child.external"
              [routerLink]="child.path"
              routerLinkActive="active"
              (click)="closeMenu()"
            >
              {{ t(child.labelKey) }}
            </a>
            <a
              *ngIf="child.external"
              [href]="child.path"
              target="_blank"
              rel="noreferrer"
              (click)="closeMenu()"
            >
              {{ t(child.labelKey) }}
            </a>
          </li>
        </ul>
      </li>
    </ul>

    <div class="nav-actions">
      <button
        class="language-toggle"
        type="button"
        [attr.aria-label]="t('language.toggleLabel')"
        (click)="toggleLanguage()"
      >
        <span [class.active]="languageService.language() === 'en'">{{ t('language.english') }}</span>
        <span [class.active]="languageService.language() === 'tcz'">{{ t('language.thadou') }}</span>
      </button>
      <a class="give-link" [href]="church.links.giving" target="_blank" rel="noreferrer">{{ t('nav.give') }}</a>
    </div>
  </nav>
</header>
