<footer class="site-footer">
  <div class="footer-inner">
    <section>
      <h2>{{ church.name }}</h2>
      <p>{{ church.address }}</p>
    </section>

    <section class="footer-services">
      <h2>Service Times</h2>
      <div *ngFor="let service of church.serviceTimes" class="service-item">
        <span>{{ service.label }}</span>
        <strong>{{ service.time }}</strong>
      </div>
    </section>

    <section>
      <h2>Connect</h2>
      <a routerLink="/contact">Contact Us</a>
      <a routerLink="/sermons">Sermons</a>
      <a routerLink="/songbook">Songbook</a>
      <a [href]="church.links.bylaws" target="_blank" rel="noreferrer">Bylaws</a>
      <a [href]="church.links.giving" target="_blank" rel="noreferrer">Give Online</a>
    </section>

    <section>
      <h2>Follow</h2>
      <a *ngFor="let link of church.socialLinks" [href]="link.url" target="_blank" rel="noreferrer">
        {{ link.label }}
      </a>
    </section>
  </div>

  <div class="footer-bottom">
    <p>&copy; {{ currentYear }} {{ church.name }}. All rights reserved.</p>
  </div>
</footer>
